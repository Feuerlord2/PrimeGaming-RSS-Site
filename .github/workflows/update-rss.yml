name: Update RSS

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */8 * * *"
    - cron: "0 20 * * *"
    - cron: "0 22 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update_rss_feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test

      # Pull requests only validate build + tests; scraping and committing
      # happens on schedule, manual dispatch, and pushes to main.
      - name: Install Playwright browsers
        if: github.event_name != 'pull_request'
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        if: github.event_name != 'pull_request'
        run: npm start

      - uses: EndBug/add-and-commit@v9
        if: github.event_name != 'pull_request'
        with:
          default_author: github_actions
          message: 'Update RSS feed'
          add: 'docs/games.rss data/state.json'
